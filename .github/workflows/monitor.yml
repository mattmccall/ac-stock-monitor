name: AC stock monitor

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes (UTC)
  workflow_dispatch:           # manual run button
    inputs:
      smoke_test:
        description: "Send a Telegram test alert and exit (no scraping/state)"
        type: boolean
        default: false

# Allow the job to commit the updated state file back to the repo.
permissions:
  contents: write

# Don't let a slow run overlap the next scheduled run.
concurrency:
  group: ac-stock-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python tests/test_stock_parsing.py

      - name: Install Playwright Chromium
        if: ${{ inputs.smoke_test != true }}
        run: python -m playwright install --with-deps chromium

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [[ "${{ inputs.smoke_test }}" == "true" ]]; then
            python monitor.py --smoke-test
          else
            python monitor.py
          fi

      - name: Commit updated state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update stock state [skip ci]"
            git push
          else
            echo "No state change."
          fi
