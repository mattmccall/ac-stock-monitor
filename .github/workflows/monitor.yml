name: AC stock monitor

on:
  schedule:
    # Every 15 min at :08/:23/:38/:53 (UTC) — off the contended top-of-hour
    # (and quarter-hours), where GitHub delays scheduled runs the most. Public
    # repo => Actions minutes are free, so frequent checks cost nothing.
    - cron: "8,23,38,53 * * * *"
    # Daily heartbeat at 10:23 UTC = ~12:23 Luxembourg in summer (CEST),
    # 11:23 in winter (CET). :23 is also in the schedule above, so at 10:23
    # both fire (one real check + one heartbeat), as before. Cron is UTC-only.
    - cron: "23 10 * * *"
  workflow_dispatch:           # manual run button
    inputs:
      smoke_test:
        description: "Send a Telegram test alert and exit (no scraping/state)"
        type: boolean
        default: false

# Allow the job to commit the updated state file back to the repo.
permissions:
  contents: write

# Don't let a slow run overlap the next scheduled run.
concurrency:
  group: ac-stock-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python tests/test_stock_parsing.py

      - name: Install Playwright Chromium
        if: ${{ inputs.smoke_test != true }}
        run: python -m playwright install --with-deps chromium

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # HiFi.lu geo/IP-blocks cloud runners (timeout). Skip it in CI; it
          # still runs locally, where this var is unset.
          DISABLE_RETAILERS: "HiFi.lu"
        run: |
          if [[ "${{ inputs.smoke_test }}" == "true" ]]; then
            python monitor.py --smoke-test
          elif [[ "${{ github.event.schedule }}" == "23 10 * * *" ]]; then
            python monitor.py --heartbeat
          else
            python monitor.py
          fi

      - name: Commit updated state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update stock state [skip ci]"
            git push
          else
            echo "No state change."
          fi
